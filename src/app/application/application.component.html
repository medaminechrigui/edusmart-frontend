<div class="application-container">
  <div class="application-card">

    <div class="application-header">
      <h2>🎓 EduSmart</h2>
      <p>Undergraduate Application Form — License</p>
      <span class="note">Please fill all fields carefully. Your application will be reviewed by the admin.</span>
    </div>

    <form class="application-form" (ngSubmit)="onSubmit()">

      <!-- Personal Information -->
      <div class="section-title">Personal Information</div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name (French)</label>
          <input type="text" placeholder="Prénom" [(ngModel)]="firstNameFr" name="firstNameFr" />
        </div>
        <div class="form-group">
          <label>Last Name (French)</label>
          <input type="text" placeholder="Nom" [(ngModel)]="lastNameFr" name="lastNameFr" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" [(ngModel)]="dateOfBirth" name="dateOfBirth" />
        </div>
        <div class="form-group">
          <label>Place of Birth</label>
          <input type="text" placeholder="e.g. Tunis" [(ngModel)]="placeOfBirth" name="placeOfBirth" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Gender</label>
          <select [(ngModel)]="gender" name="gender">
            <option value="" disabled selected>Select gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nationality</label>
          <input type="text" placeholder="e.g. Tunisian" [(ngModel)]="nationality" name="nationality" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>National ID (CIN)</label>
          <input type="text" placeholder="Enter your CIN number" [(ngModel)]="cin" name="cin" />
        </div>
        <div class="form-group">
          <label>CIN Issue Date</label>
          <input type="date" [(ngModel)]="cinIssueDate" name="cinIssueDate" />
        </div>
      </div>

      <!-- Contact Information -->
      <div class="section-title">Contact Information</div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="example@email.com" [(ngModel)]="email" name="email" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+216 XX XXX XXX" [(ngModel)]="phone" name="phone" />
        </div>
        <div class="form-group">
          <label>Emergency Contact (Parent/Guardian)</label>
          <input type="tel" placeholder="+216 XX XXX XXX" [(ngModel)]="emergencyContact" name="emergencyContact" />
        </div>
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" placeholder="Street, City" [(ngModel)]="address" name="address" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Governorate</label>
          <select [(ngModel)]="governorate" name="governorate">
            <option value="" disabled selected>Select governorate</option>
            <option>Tunis</option>
            <option>Ariana</option>
            <option>Ben Arous</option>
            <option>Manouba</option>
            <option>Bizerte</option>
            <option>Nabeul</option>
            <option>Béja</option>
            <option>Jendouba</option>
            <option>Kef</option>
            <option>Siliana</option>
            <option>Sousse</option>
            <option>Monastir</option>
            <option>Mahdia</option>
            <option>Sfax</option>
            <option>Kairouan</option>
            <option>Kasserine</option>
            <option>Sidi Bouzid</option>
            <option>Gabès</option>
            <option>Médenine</option>
            <option>Tataouine</option>
            <option>Gafsa</option>
            <option>Tozeur</option>
            <option>Kebili</option>
            <option>Zaghouan</option>
          </select>
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input type="text" placeholder="e.g. 1000" [(ngModel)]="postalCode" name="postalCode" />
        </div>
      </div>

      <!-- Baccalaureate Information -->
      <div class="section-title">Baccalaureate Information</div>

      <div class="form-row">
        <div class="form-group">
          <label>Baccalaureate Year</label>
          <input type="number" placeholder="e.g. 2024" [(ngModel)]="bacYear" name="bacYear" />
        </div>
        <div class="form-group">
          <label>Baccalaureate Session</label>
          <select [(ngModel)]="bacSession" name="bacSession">
            <option value="" disabled selected>Select session</option>
            <option>Main (Principale)</option>
            <option>Control (Contrôle)</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Baccalaureate Section</label>
          <select [(ngModel)]="bacSection" name="bacSection">
            <option value="" disabled selected>Select section</option>
            <option>Mathematics</option>
            <option>Sciences</option>
            <option>Technical Sciences</option>
            <option>Computer Science</option>
            <option>Economics & Management</option>
            <option>Literature</option>
            <option>Sport</option>
          </select>
        </div>
        <div class="form-group">
          <label>Baccalaureate Grade</label>
          <input type="number" placeholder="e.g. 14.75" step="0.01" min="10" max="20" [(ngModel)]="bacGrade"
            name="bacGrade" />
        </div>
      </div>

      <div class="form-group">
        <label>Previous High School</label>
        <input type="text" placeholder="Name of your high school" [(ngModel)]="highSchool" name="highSchool" />
      </div>

      <!-- Academic Preferences -->
      <div class="section-title">Academic Preferences</div>

      <div class="form-group">
        <label>Desired Department</label>
        <select [(ngModel)]="department" name="department">
          <option value="" disabled selected>Select department</option>
          <option>Computer Science</option>
          <option>Mathematics</option>
          <option>Physics</option>
          <option>Civil Engineering</option>
          <option>Electrical Engineering</option>
        </select>
      </div>

      <div class="form-group">
        <label>Additional Notes (optional)</label>
        <textarea placeholder="Any additional information you'd like to share..." [(ngModel)]="notes"
          name="notes"></textarea>
      </div>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Submitting...' : 'Submit Application' }}
      </button>

    </form>

    <p class="back-link" (click)="goBack()">← Back to Home</p>

  </div>
</div>
