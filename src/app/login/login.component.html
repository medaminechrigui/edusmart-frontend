<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>🎓 EduSmart</h2>
      <p>Sign in to your account</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" [(ngModel)]="email" name="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" [(ngModel)]="password" name="password" />
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-submit">Login</button>

    </form>

    <p class="back-link" (click)="goBack()">← Back to Home</p>

  </div>
</div>
